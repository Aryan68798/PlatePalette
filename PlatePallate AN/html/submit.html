<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlatePalette — Submit a Recipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/responsive/styles.css" />
  <link rel="stylesheet" href="../css/submit.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">PLATE<span>PALETTE</span></a>
  <ul class="nav-links">
    <li><a href="explore.html">Explore</a></li>
  </ul>
  <div class="nav-right">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Search recipes…" />
    </div>
  </div>
</nav>

<div class="submit-page">
  <div class="submit-header">
    <h1>SUBMIT YOUR<br><span>RECIPE</span></h1>
    <p>Got a dish that slaps? Share it with the PlatePalette community and let the world taste your magic.</p>
  </div>

  <div class="submit-form" id="formCard">
    <form id="recipeForm">
      <div class="form-group">
        <label>Recipe Name</label>
        <input type="text" placeholder="E.g., Kimchi Grilled Cheese" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Prep Time (mins)</label>
          <input type="number" placeholder="15" required />
        </div>
        <div class="form-group">
          <label>Cook Time (mins)</label>
          <input type="number" placeholder="20" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cuisine</label>
          <select required>
            <option value="">Select cuisine…</option>
            <option>Italian</option>
            <option>Mexican</option>
            <option>Japanese</option>
            <option>Indian</option>
            <option>French</option>
            <option>American</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select required>
            <option value="">Select difficulty…</option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Ingredients</label>
        <textarea rows="4" placeholder="One ingredient per line…" required></textarea>
      </div>
      <div class="form-group">
        <label>Instructions</label>
        <textarea rows="5" placeholder="Step-by-step instructions…" required></textarea>
      </div>
      <div class="form-group">
        <label>Short Description</label>
        <textarea rows="2" placeholder="What makes this dish special?" required></textarea>
      </div>
      <button type="submit" class="submit-btn">🚀 Submit Recipe</button>
    </form>
  </div>

  <div class="success-msg" id="successMsg">
    <div class="big">🎉</div>
    <h2>RECIPE SUBMITTED!</h2>
    <p>Your recipe is now under review. The community will taste your magic soon!</p>
    <a href="explore.html">Browse Recipes →</a>
  </div>
</div>

<a href="surprise.html" class="nav-surprise-btn">Surprise Me 🎲</a>

<script src="../js/submit.js"></script>
</body>
</html>
